<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P for Pizza Online</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PeerJS for WebRTC Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

    <style>
        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
        .timer-bar {
            animation: shrink 5s linear forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        body {
            background-color: #fffaf0; /* orange-50 */
            touch-action: manipulation; /* better touch targeting */
        }
        .pizza-slice {
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body class="text-slate-800 font-sans h-screen flex flex-col overflow-hidden">
    <div id="root" class="flex-grow flex flex-col h-full w-full max-w-4xl mx-auto relative shadow-2xl bg-white border-x border-slate-100"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GAME DATA ---
        const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','W'];
        const CATEGORIES = [
            "Pizza Toppings", "Things that are green", "Countries", "Musical Instruments", "Sports", 
            "Capital Cities", "Animals", "Things in a kitchen", "Fruits", "Vegetables", 
            "Movies", "Fictional Characters", "Brands", "Things that are loud", "Things that are soft", 
            "Things you wear", "Things with wheels", "Things you plug in", "Things at the beach", "Things you read", 
            "Things you throw", "Things with screens", "Jobs", "Hobbies", "Languages", 
            "Famous People", "Video Games", "Board Games", "Insects", "Birds", 
            "Reptiles", "Candy", "Snacks", "Drinks", "Desserts", 
            "Things in space", "Things underground", "Things in the ocean", "Tools", "Vehicles", 
            "Toys", "Colors", "Spices", "Flowers", "Trees", 
            "Rivers", "Mountains", "Things that are hot", "Things that are cold", "Things with buttons", 
            "Things in a hospital", "Things at a party", "Things in a forest", "Things in the sky", "Things you open", 
            "Things you close", "Things you write with", "Things you cut with", "Things that smell", "Things you fold", 
            "Things you wash", "Things you lock", "Things with batteries", "Things that fly", "Things that swim", 
            "Things that jump", "Things that crawl", "Things with tails", "Things with stripes", "Things with spots", 
            "Things made of wood", "Things made of metal", "Things made of plastic", "Things made of glass", "Things made of paper", 
            "Things you paint", "Things you build", "Things you climb", "Things you ride", "Things you drive", 
            "Things you fly", "Things you push", "Things you pull", "Things you lift", "Things you drop", 
            "Things you catch", "Things you kick", "Things you hit", "Things you bounce", "Things you spin", 
            "Things you roll", "Things you stretch", "Things you squeeze", "Things you break", "Things you fix", 
            "Things you lose", "Things you find", "Things you hide", "Things you seek", "Superheroes", "Villains"
        ];

        // Helper to draw random cards
        const drawNewCards = (state) => {
            const shuffledLetters = [...LETTERS].sort(() => 0.5 - Math.random());
            const shuffledCategories = [...CATEGORIES].sort(() => 0.5 - Math.random());
            state.letters = shuffledLetters.slice(0, 3);
            state.categories = shuffledCategories.slice(0, 3);
        };

        const App = () => {
            const [appState, setAppState] = useState('home'); // home, lobby, game
            const [role, setRole] = useState(null); // host, peer
            const [name, setName] = useState('');
            const [roomCode, setRoomCode] = useState('');
            const [myId, setMyId] = useState('');
            
            const [toast, setToast] = useState(null);

            const [gameState, setGameState] = useState({
                players: [], // { id, name, score }
                status: 'waiting', // waiting, playing, answering, voting, gameover
                letters: [],
                categories: [],
                activePlayerId: null,
                answerData: null,
                votes: { yes: 0, no: 0, votedIds: [] },
                winner: null
            });

            // Refs for Host Authority
            const peerRef = useRef(null);
            const connsRef = useRef([]); // Host tracking peers
            const connRef = useRef(null); // Peer tracking host
            const hostStateRef = useRef(gameState);
            const hostTimerRef = useRef(null);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3500);
            };

            // --- HOST LOGIC ---
            const updateHostState = (modifier) => {
                modifier(hostStateRef.current);
                const newState = JSON.parse(JSON.stringify(hostStateRef.current));
                setGameState(newState);
                // Broadcast to all connected peers
                connsRef.current.forEach(c => c.send({ type: 'SYNC', payload: newState }));
            };

            const broadcastToast = (msg) => {
                showToast(msg);
                connsRef.current.forEach(c => c.send({ type: 'TOAST', payload: msg }));
            };

            const handlePeerData = (senderId, data) => {
                const s = hostStateRef.current;
                switch (data.type) {
                    case 'JOIN':
                        updateHostState(draft => {
                            if (!draft.players.find(p => p.id === senderId)) {
                                draft.players.push({ id: senderId, name: data.payload.name, score: 0 });
                            }
                        });
                        break;
                    case 'BUZZ':
                        if (s.status !== 'playing') return;
                        updateHostState(draft => {
                            draft.status = 'answering';
                            draft.activePlayerId = senderId;
                        });
                        // 6s timeout as a backup in case the answering player disconnects or client timer fails
                        hostTimerRef.current = setTimeout(() => {
                            broadcastToast("Time's up! No answer submitted.");
                            updateHostState(draft => {
                                draft.status = 'playing';
                                draft.activePlayerId = null;
                                drawNewCards(draft);
                            });
                        }, 6000);
                        break;
                    case 'SUBMIT_ANSWER':
                        if (s.status !== 'answering' || s.activePlayerId !== senderId) return;
                        clearTimeout(hostTimerRef.current);
                        
                        if (!data.payload.text || data.payload.text.trim() === '') {
                            broadcastToast("Blank answer rejected!");
                            updateHostState(draft => { draft.status = 'playing'; drawNewCards(draft); });
                            return;
                        }

                        updateHostState(draft => {
                            draft.status = 'voting';
                            draft.answerData = data.payload;
                            draft.votes = { yes: 0, no: 0, votedIds: [] };
                        });
                        break;
                    case 'VOTE':
                        if (s.status !== 'voting' || s.votes.votedIds.includes(senderId)) return;
                        
                        let pass = false;
                        let fail = false;

                        updateHostState(draft => {
                            draft.votes.votedIds.push(senderId);
                            if (data.payload === 'yes') draft.votes.yes++;
                            else draft.votes.no++;

                            // If playing solo, self-vote is allowed. Otherwise, voters = all players except active.
                            const votersRequired = draft.players.length > 1 ? draft.players.length - 1 : 1;

                            if (draft.votes.no > 0) {
                                fail = true;
                            } else if (draft.votes.yes >= votersRequired) {
                                pass = true;
                            }
                        });

                        if (fail) {
                            broadcastToast("The lobby rejected the answer! ❌");
                            setTimeout(() => {
                                updateHostState(draft => { draft.status = 'playing'; drawNewCards(draft); });
                            }, 2500);
                        } else if (pass) {
                            const p = s.players.find(x => x.id === s.activePlayerId);
                            broadcastToast(`Unanimous! ${p.name} earned a slice! 🍕`);
                            setTimeout(() => {
                                updateHostState(draft => {
                                    const playerToUpdate = draft.players.find(x => x.id === s.activePlayerId);
                                    playerToUpdate.score++;
                                    if (playerToUpdate.score >= 9) {
                                        draft.status = 'gameover';
                                        draft.winner = playerToUpdate;
                                    } else {
                                        draft.status = 'playing';
                                        drawNewCards(draft);
                                    }
                                });
                            }, 2500);
                        }
                        break;
                }
            };

            const createRoom = () => {
                if (!name.trim()) return alert("Enter your name!");
                setAppState('loading');
                const code = Math.random().toString(36).substring(2, 6).toUpperCase();
                const hostId = `P4P-${code}`;
                
                const peer = new Peer(hostId);
                peer.on('open', (id) => {
                    setMyId(id);
                    setRoomCode(code);
                    setRole('host');
                    setAppState('lobby');
                    
                    // Initialize host state
                    updateHostState(draft => {
                        draft.players = [{ id, name, score: 0 }];
                        drawNewCards(draft);
                    });
                });

                peer.on('connection', (conn) => {
                    conn.on('data', (data) => handlePeerData(conn.peer, data));
                    conn.on('open', () => { connsRef.current.push(conn); });
                    conn.on('close', () => {
                        connsRef.current = connsRef.current.filter(c => c.peer !== conn.peer);
                        updateHostState(draft => {
                            draft.players = draft.players.filter(p => p.id !== conn.peer);
                            // Safety reset if voting gets stuck due to disconnect
                            if (draft.status === 'voting' && draft.players.length <= 1) {
                                draft.status = 'playing';
                                drawNewCards(draft);
                            }
                        });
                    });
                });
                
                peer.on('error', (err) => {
                    alert("Error: " + err.type);
                    setAppState('home');
                });
                peerRef.current = peer;
            };

            // --- PEER LOGIC ---
            const joinRoom = (codeToJoin) => {
                if (!name.trim()) return alert("Enter your name!");
                if (!codeToJoin.trim()) return alert("Enter a room code!");
                
                setAppState('loading');
                const hostId = `P4P-${codeToJoin.toUpperCase()}`;
                
                const peer = new Peer();
                peer.on('open', (id) => {
                    setMyId(id);
                    const conn = peer.connect(hostId);
                    
                    conn.on('open', () => {
                        connRef.current = conn;
                        setRole('peer');
                        setRoomCode(codeToJoin.toUpperCase());
                        setAppState('lobby');
                        conn.send({ type: 'JOIN', payload: { name } });
                    });
                    
                    conn.on('data', (data) => {
                        if (data.type === 'SYNC') {
                            setGameState(data.payload);
                            // Explicitly force peer into game view if the game has started
                            if (data.payload.status !== 'waiting') {
                                setAppState('game');
                            }
                        }
                        else if (data.type === 'TOAST') showToast(data.payload);
                    });
                    
                    conn.on('close', () => {
                        alert("Host disconnected.");
                        window.location.reload();
                    });
                });

                peer.on('error', (err) => {
                    alert("Could not connect. Is the room code correct?");
                    setAppState('home');
                });
                peerRef.current = peer;
            };

            // --- ACTIONS ---
            const sendAction = (type, payload) => {
                if (role === 'host') {
                    handlePeerData(myId, { type, payload });
                } else if (connRef.current) {
                    connRef.current.send({ type, payload });
                }
            };

            const startGame = () => {
                if (role !== 'host') return;
                setAppState('game'); // Explicitly force view change for the host
                updateHostState(draft => {
                    draft.status = 'playing';
                    draft.players.forEach(p => p.score = 0);
                    draft.winner = null;
                });
            };

            const restartGame = () => {
                if (role !== 'host') return;
                setAppState('game');
                updateHostState(draft => {
                    draft.status = 'playing';
                    draft.players.forEach(p => p.score = 0);
                    draft.winner = null;
                    drawNewCards(draft);
                });
            };

            // --- COMPONENTS ---
            const RenderPizza = ({ score }) => {
                const slices = [];
                for (let i = 0; i < 9; i++) {
                    slices.push(
                        <span key={i} className={`text-xl ${i < score ? 'opacity-100 pizza-slice' : 'opacity-20 grayscale'}`}>
                            🍕
                        </span>
                    );
                }
                return <div className="flex space-x-1">{slices}</div>;
            };

            const AnsweringOverlay = () => {
                const [text, setText] = useState('');
                
                useEffect(() => {
                    // Auto-submit after strict 5 seconds on client side
                    const t = setTimeout(() => {
                        sendAction('SUBMIT_ANSWER', { text });
                    }, 5000);
                    return () => clearTimeout(t);
                }, [text]); // Wait, if I depend on text, it resets timer. 
                // Fix: keep timer independent of text.

                const textRef = useRef('');
                useEffect(() => { textRef.current = text; }, [text]);
                
                useEffect(() => {
                    const t = setTimeout(() => {
                        sendAction('SUBMIT_ANSWER', { text: textRef.current });
                    }, 5000);
                    return () => clearTimeout(t);
                }, []);

                const handleSubmit = (e) => {
                    e.preventDefault();
                    sendAction('SUBMIT_ANSWER', { text });
                };

                return (
                    <div className="absolute inset-0 z-50 bg-slate-900/90 flex flex-col items-center justify-center p-6 text-center animate-[slideIn_0.2s]">
                        <h2 className="text-white text-3xl font-black mb-6 uppercase tracking-wider">Quick! Type it!</h2>
                        
                        <div className="w-full max-w-sm bg-slate-700 h-6 rounded-full mb-8 overflow-hidden border-2 border-white">
                            <div className="bg-red-500 h-full timer-bar"></div>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="w-full max-w-sm flex flex-col gap-4">
                            <input
                                autoFocus
                                className="p-4 text-3xl font-bold rounded-xl w-full text-center outline-none border-4 border-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.5)] uppercase focus:ring-0"
                                value={text}
                                onChange={e => setText(e.target.value.toUpperCase())}
                                placeholder="TYPE HERE..."
                                autoComplete="off"
                            />
                            <button type="submit" className="bg-green-500 hover:bg-green-600 text-white p-4 rounded-xl font-black text-2xl uppercase shadow-lg transform active:scale-95 transition">
                                Submit
                            </button>
                        </form>
                    </div>
                );
            };

            const VotingOverlay = () => {
                const { answerData, activePlayerId, players } = gameState;
                const activePlayer = players.find(p => p.id === activePlayerId);
                const amIActive = myId === activePlayerId;
                const haveIVoted = gameState.votes.votedIds.includes(myId);

                return (
                    <div className="absolute inset-0 z-40 bg-slate-900/95 flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full relative">
                            <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-slate-900 font-black px-6 py-2 rounded-full border-4 border-white shadow-md uppercase">
                                Voting Time
                            </div>
                            
                            <h3 className="text-xl font-bold text-slate-500 mb-2">{activePlayer?.name} answers:</h3>
                            <div className="text-4xl font-black text-slate-800 mb-6 bg-slate-100 p-4 rounded-xl border-2 border-slate-200 break-words">
                                "{answerData?.text || '???'}"
                            </div>

                            {!amIActive && !haveIVoted && (
                                <div className="space-y-4">
                                    <p className="font-bold text-slate-600">Does this match a category & letter on the board?</p>
                                    <div className="flex gap-4 pt-2">
                                        <button onClick={() => sendAction('VOTE', 'no')} className="flex-1 bg-red-100 hover:bg-red-200 text-red-700 border-2 border-red-200 p-4 rounded-2xl font-black text-xl transition transform active:scale-95">
                                            NO ❌
                                        </button>
                                        <button onClick={() => sendAction('VOTE', 'yes')} className="flex-1 bg-green-100 hover:bg-green-200 text-green-700 border-2 border-green-200 p-4 rounded-2xl font-black text-xl transition transform active:scale-95">
                                            YES ✅
                                        </button>
                                    </div>
                                </div>
                            )}

                            {(amIActive || haveIVoted) && (
                                <div className="py-8">
                                    <div className="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                    <p className="font-bold text-slate-500 text-lg">Waiting for the lobby to vote...</p>
                                    <p className="text-sm mt-2 text-slate-400">
                                        Votes: ✅ {gameState.votes.yes} | ❌ {gameState.votes.no}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // --- VIEWS ---
            if (appState === 'loading') return <div className="h-full flex items-center justify-center font-bold text-xl text-slate-500">Connecting to server...</div>;

            if (appState === 'home') return (
                <div className="flex flex-col items-center justify-center h-full p-6 bg-yellow-400 text-slate-900">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border-4 border-slate-900">
                        <div className="text-6xl mb-4">🍕</div>
                        <h1 className="text-4xl font-black mb-8 uppercase tracking-tighter transform -rotate-2">P for Pizza</h1>
                        
                        <div className="space-y-6 text-left">
                            <div>
                                <label className="block font-bold mb-2 uppercase text-sm text-slate-500">Your Name</label>
                                <input 
                                    className="w-full border-4 border-slate-200 p-3 rounded-xl font-bold text-lg focus:border-yellow-400 outline-none transition"
                                    value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Mario" maxLength={15}
                                />
                            </div>
                            
                            <hr className="border-slate-200 border-2 rounded" />

                            <div className="flex flex-col gap-3">
                                <button onClick={createRoom} className="w-full bg-slate-900 text-white font-black uppercase text-lg p-4 rounded-xl hover:bg-slate-800 transition transform hover:-translate-y-1 shadow-lg">
                                    Create New Game
                                </button>
                                
                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t-2 border-slate-200"></div>
                                    <span className="flex-shrink-0 mx-4 text-slate-400 font-bold uppercase text-sm">OR</span>
                                    <div className="flex-grow border-t-2 border-slate-200"></div>
                                </div>

                                <div className="flex gap-2">
                                    <input 
                                        className="w-full border-4 border-slate-200 p-3 rounded-xl font-bold text-lg text-center uppercase focus:border-yellow-400 outline-none transition placeholder-slate-300"
                                        id="joinCode" placeholder="ROOM CODE" maxLength={4}
                                    />
                                    <button onClick={() => joinRoom(document.getElementById('joinCode').value)} className="bg-orange-500 text-white font-black uppercase px-6 rounded-xl hover:bg-orange-600 transition shadow-md">
                                        Join
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (appState === 'lobby') return (
                <div className="flex flex-col items-center justify-center h-full p-6 bg-slate-50">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-2 border-slate-100 relative overflow-hidden">
                        
                        <div className="bg-yellow-400 absolute top-0 left-0 right-0 py-3 border-b-2 border-slate-900/10">
                            <p className="font-bold text-slate-800 uppercase text-sm tracking-widest">Room Code</p>
                            <h2 className="text-4xl font-black tracking-widest text-slate-900">{roomCode}</h2>
                        </div>

                        <div className="mt-24 mb-8">
                            <h3 className="font-black text-xl text-slate-400 uppercase mb-4 text-left border-b-2 pb-2">Players Lobby ({gameState.players.length})</h3>
                            <div className="flex flex-col gap-2">
                                {gameState.players.map(p => (
                                    <div key={p.id} className="flex items-center justify-between bg-slate-100 p-3 rounded-xl">
                                        <span className="font-bold text-lg">{p.name} {p.id === myId && "(You)"}</span>
                                        {p.id === gameState.players[0].id && <span className="text-xs bg-slate-300 px-2 py-1 rounded-md font-bold text-slate-600 uppercase">Host</span>}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {role === 'host' ? (
                            <button onClick={startGame} className="w-full bg-green-500 text-white font-black text-2xl p-4 rounded-2xl hover:bg-green-600 shadow-lg transform transition active:scale-95 uppercase">
                                Start Game 🍕
                            </button>
                        ) : (
                            <div className="p-4 bg-slate-100 rounded-xl font-bold text-slate-500 animate-pulse">
                                Waiting for Host to start...
                            </div>
                        )}
                    </div>
                </div>
            );

            // GAME VIEW
            if (appState === 'game') return (
                <div className="flex flex-col h-full bg-orange-50 relative">
                    {/* Header / Scores */}
                    <header className="bg-white border-b-2 border-slate-200 p-4 shadow-sm z-10 flex-shrink-0">
                        <div className="flex overflow-x-auto gap-4 pb-2 hide-scrollbar">
                            {gameState.players.map(p => (
                                <div key={p.id} className={`flex flex-col bg-slate-50 border-2 rounded-xl p-2 min-w-[140px] ${p.id === gameState.activePlayerId ? 'border-yellow-400 bg-yellow-50 shadow-md transform -translate-y-1' : 'border-slate-200'}`}>
                                    <span className="font-bold text-sm text-slate-600 truncate">{p.name}</span>
                                    <RenderPizza score={p.score} />
                                </div>
                            ))}
                        </div>
                    </header>

                    {/* Main Board Area */}
                    <main className="flex-grow p-4 md:p-8 flex flex-col gap-6 justify-center relative z-0 overflow-y-auto">
                        
                        {gameState.status === 'gameover' ? (
                            <div className="text-center bg-white p-8 rounded-3xl shadow-2xl border-4 border-yellow-400">
                                <h1 className="text-6xl mb-4">🏆🍕</h1>
                                <h2 className="text-4xl font-black text-slate-800 mb-2">{gameState.winner.name} WINS!</h2>
                                <p className="text-xl text-slate-500 font-bold mb-8">They built the perfect pizza.</p>
                                {role === 'host' && (
                                    <button onClick={restartGame} className="bg-slate-900 text-white font-black p-4 px-8 rounded-2xl text-xl uppercase shadow-lg hover:bg-slate-800 transition">
                                        Play Again
                                    </button>
                                )}
                            </div>
                        ) : (
                            <>
                                <div className="text-center">
                                    <span className="bg-yellow-400 text-slate-900 font-black px-4 py-1 rounded-full text-sm uppercase tracking-wider shadow-sm">
                                        Match any letter to any category
                                    </span>
                                </div>

                                {/* Letters */}
                                <div className="grid grid-cols-3 gap-3 md:gap-6">
                                    {gameState.letters.map((l, i) => (
                                        <div key={i} className="aspect-square bg-white border-4 border-blue-100 rounded-3xl shadow-sm flex items-center justify-center text-5xl md:text-7xl font-black text-blue-500">
                                            {l}
                                        </div>
                                    ))}
                                </div>

                                {/* Categories */}
                                <div className="grid grid-cols-1 gap-3 md:gap-4 mt-4">
                                    {gameState.categories.map((c, i) => (
                                        <div key={i} className="bg-white border-4 border-red-100 rounded-2xl shadow-sm p-4 md:p-6 flex items-center justify-center text-center">
                                            <span className="text-xl md:text-2xl font-black text-red-500 uppercase leading-tight">{c}</span>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                    </main>

                    {/* Buzzer Area */}
                    {gameState.status === 'playing' && (
                        <div className="p-6 bg-white border-t-2 border-slate-200 z-10 flex-shrink-0 flex justify-center">
                            <button 
                                onClick={() => sendAction('BUZZ')}
                                className="bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-black text-4xl uppercase p-6 rounded-full w-full max-w-sm shadow-[0_8px_0_rgb(185,28,28)] active:shadow-[0_0px_0_rgb(185,28,28)] active:translate-y-2 transition-all"
                            >
                                BUZZ!
                            </button>
                        </div>
                    )}

                    {/* Overlays */}
                    {gameState.status === 'answering' && gameState.activePlayerId === myId && <AnsweringOverlay />}
                    {gameState.status === 'answering' && gameState.activePlayerId !== myId && (
                        <div className="absolute inset-0 z-40 bg-slate-900/80 flex flex-col items-center justify-center p-6 text-center">
                            <div className="w-16 h-16 border-8 border-yellow-400 border-t-transparent rounded-full animate-spin mb-6"></div>
                            <h2 className="text-white text-3xl font-black uppercase">
                                {gameState.players.find(p => p.id === gameState.activePlayerId)?.name} is typing...
                            </h2>
                        </div>
                    )}

                    {gameState.status === 'voting' && <VotingOverlay />}

                    {/* Toast Notification */}
                    {toast && (
                        <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none">
                            <div className="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-lg toast-enter border-2 border-slate-700">
                                {toast}
                            </div>
                        </div>
                    )}
                </div>
            );
            
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
